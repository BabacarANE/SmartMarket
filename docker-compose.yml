x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1
  environment:
    _PIP_ADDITIONAL_REQUIREMENTS: "pg8000 requests tenacity pandas"
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://smartmarket:x@postgres/smartmarket_db
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: "smartmarket_secret"
    FRANCE_TRAVAIL_CLIENT_ID: ${FRANCE_TRAVAIL_CLIENT_ID}
    FRANCE_TRAVAIL_CLIENT_SECRET: ${FRANCE_TRAVAIL_CLIENT_SECRET}
    ADZUNA_APP_ID: ${ADZUNA_APP_ID}
    ADZUNA_API_KEY: ${ADZUNA_API_KEY}
    DB_CONN_STRING: "postgresql+pg8000://smartmarket:x@postgres:5432/smartmarket_db"
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - ./ml:/opt/airflow/ml
    - ./dbt:/opt/airflow/dbt
    - ./dbt_project.yml:/opt/airflow/dbt_project.yml
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: smartmarket
      POSTGRES_PASSWORD: x
      POSTGRES_DB: smartmarket_db
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "smartmarket"]
      interval: 10s
      retries: 5
      start_period: 5s

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@smartmarket.io
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles: ["dev"]

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install sqlalchemy pg8000 requests tenacity pandas
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@smartmarket.io
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob"]
      interval: 30s
      timeout: 10s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    command: >
      bash -c "pip install psycopg2-binary -q &&
      mlflow server
      --backend-store-uri postgresql://smartmarket:x@postgres/smartmarket_db?options=-csearch_path=mlflow
      --artifacts-destination /mlruns
      --serve-artifacts
      --host 0.0.0.0
      --port 5000"
    volumes:
      - mlflow-artifacts:/mlruns
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
        
volumes:
  postgres-data:
  airflow-logs:
  mlflow-artifacts:
